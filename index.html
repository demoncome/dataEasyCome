<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星超频 - 内存配置性能对比分析工具</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }
        .container {
            max-width: 1800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        /* 控制面板 */
        .control-panel {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            backdrop-filter: blur(10px);
        }
        .control-section {
            margin-bottom: 20px;
        }
        .control-section:last-child {
            margin-bottom: 0;
        }
        .control-label {
            font-size: 14px;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(51, 65, 85, 0.6);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            font-size: 13px;
        }
        .checkbox-item:hover {
            background: rgba(71, 85, 105, 0.8);
            transform: translateY(-2px);
        }
        .checkbox-item.active {
            border-color: #60a5fa;
            background: rgba(96, 165, 250, 0.2);
        }
        .checkbox-item input {
            display: none;
        }
        .check-icon {
            width: 18px;
            height: 18px;
            border: 2px solid #64748b;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 12px;
        }
        .checkbox-item.active .check-icon {
            background: #60a5fa;
            border-color: #60a5fa;
        }
        
        /* 分辨率选择 */
        .res-toggle {
            display: flex;
            gap: 10px;
            background: rgba(51, 65, 85, 0.6);
            padding: 4px;
            border-radius: 10px;
            width: fit-content;
        }
        .res-btn {
            padding: 8px 20px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .res-btn.active {
            background: #60a5fa;
            color: white;
        }
        
        /* 图表类型选择 */
        .chart-type-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .chart-type-btn {
            padding: 10px 20px;
            border: 2px solid rgba(96, 165, 250, 0.3);
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .chart-type-btn.active {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border-color: transparent;
            color: white;
        }
        
        /* 图表容器 */
        .chart-wrapper {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .chart {
            width: 100%;
            height: 600px;
        }
        
        /* 统计面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.1), rgba(167, 139, 250, 0.1));
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
        }
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .stat-title {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 600;
        }
        .stat-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-1k { background: rgba(96, 165, 250, 0.2); color: #60a5fa; }
        .badge-2k { background: rgba(244, 114, 182, 0.2); color: #f472b6; }
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-detail {
            margin-top: 8px;
            font-size: 12px;
            color: #64748b;
        }
        
        /* 对比表格 */
        .comparison-table {
            margin-top: 24px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }
        th {
            background: rgba(51, 65, 85, 0.8);
            color: #60a5fa;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        tr:hover {
            background: rgba(96, 165, 250, 0.05);
        }
        .cell-best {
            color: #4ade80;
            font-weight: 700;
        }
        .cell-worst {
            color: #f87171;
        }
        
        /* 颜色配置 */
        .config-colors {
            display: none;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            h1 {
                font-size: 22px;
                margin-bottom: 8px;
            }
            .subtitle {
                font-size: 12px;
                margin-bottom: 20px;
                padding: 0 10px;
            }
            .control-panel {
                padding: 16px;
                border-radius: 12px;
            }
            .control-label {
                font-size: 13px;
                margin-bottom: 10px;
            }
            .checkbox-group {
                gap: 8px;
            }
            .checkbox-item {
                padding: 6px 12px;
                font-size: 12px;
            }
            .res-toggle {
                width: 100%;
                gap: 6px;
            }
            .res-btn {
                padding: 8px 12px;
                font-size: 12px;
                flex: 1;
            }
            .chart-type-group {
                gap: 8px;
            }
            .chart-type-btn {
                padding: 8px 14px;
                font-size: 12px;
            }
            .chart-wrapper {
                padding: 16px;
                border-radius: 12px;
            }
            .chart {
                height: 400px;
            }
            .stats-panel {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-top: 16px;
            }
            .stat-card {
                padding: 16px;
            }
            .stat-value {
                font-size: 24px;
            }
            th, td {
                padding: 8px 10px;
                font-size: 12px;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 18px;
            }
            .subtitle {
                font-size: 11px;
            }
            .checkbox-item {
                padding: 5px 10px;
                font-size: 11px;
            }
            .chart {
                height: 320px;
            }
            .chart-type-btn {
                padding: 6px 10px;
                font-size: 11px;
            }
            .res-btn {
                padding: 6px 8px;
                font-size: 11px;
            }
            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>星超频 - 内存配置性能对比分析工具</h1>
        <p class="subtitle">Intel core Ultra 250 - ASUS B860 v5 - JBD 6000 C30 24g - 5070 测试平台 | 自由选择配置对比分析</p>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="control-section">
                <div class="control-label">📊 选择要对比的内存配置（点击选择/取消）：</div>
                <div class="checkbox-group" id="configGroup">
                    <!-- 动态生成 -->
                </div>
            </div>
            
            <div class="control-section">
                <div class="control-label">🎯 对比分辨率：</div>
                <div class="res-toggle">
                    <button class="res-btn active" data-res="both" onclick="setResolution('both')">1K + 2K 对比</button>
                    <button class="res-btn" data-res="1K" onclick="setResolution('1K')">仅 1K</button>
                    <button class="res-btn" data-res="2K" onclick="setResolution('2K')">仅 2K</button>
                </div>
            </div>
            
            <div class="control-section">
                <div class="control-label">📈 图表类型：</div>
                <div class="chart-type-group">
                    <button class="chart-type-btn active" onclick="setChartType('grouped')">分组柱状图</button>
                    <button class="chart-type-btn" onclick="setChartType('avgOnly')">仅平均帧</button>
                    <button class="chart-type-btn" onclick="setChartType('lowOnly')">仅1%Low</button>
                    <button class="chart-type-btn" onclick="setChartType('radar')">雷达图对比</button>
                    <button class="chart-type-btn" onclick="setChartType('line')">折线趋势</button>
                </div>
            </div>
        </div>
        
        <!-- 图表 -->
        <div class="chart-wrapper">
            <div id="mainChart" class="chart"></div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-panel" id="statsPanel"></div>
        
        <!-- 详细对比表格 -->
        <div class="chart-wrapper" style="margin-top: 24px;">
            <h3 style="margin-bottom: 20px; color: #60a5fa;">📋 详细数据对比表</h3>
            <div class="comparison-table" id="comparisonTable"></div>
        </div>
    </div>

    <script>
        // 从 Excel 提取的数据
        const testData = {
            games: ['PUBG', '三角洲', '无畏契约', 'CS2', '永劫无间'],
            configs: [
                { id: '16Gx1_默认4800', name: '16Gx1 默认4800', color: '#60a5fa', data: {
                    '1K': { avg: [212, 257, 556, 655.9, 212], low: [126, 145, 346, 194.1, 129] },
                    '2K': { avg: [197, 251, 554, 609.8, 202], low: [115, 139, 315, 185.1, 117] }
                }},
                { id: '16Gx1_xmp6000', name: '16Gx1 XMP6000', color: '#34d399', data: {
                    '1K': { avg: [245, 301, 616, 673.4, 230], low: [145, 167, 403, 200.8, 129] },
                    '2K': { avg: [242, 291, 593, 640.5, 230], low: [144, 169, 385, 198.3, 135] }
                }},
                { id: '16Gx1_xcp8200', name: '16Gx1 XCP8200', color: '#f472b6', data: {
                    '1K': { avg: [280, 313, 659, 773.5, 268], low: [156, 177, 416, 244.9, 167] },
                    '2K': { avg: [222, 287, 655, 680.3, 254], low: [144, 159, 360, 226.8, 154] }
                }},
                { id: '16Gx2_默认4800', name: '16Gx2 默认4800', color: '#fbbf24', data: {
                    '1K': { avg: [210, 271, 594, 624, 215], low: [123, 158, 357, 186.6, 136] },
                    '2K': { avg: [178, 252, 534, 604.6, 196], low: [106, 142, 338, 187.8, 122] }
                }},
                { id: '16Gx2_xmp6000', name: '16Gx2 XMP6000', color: '#a78bfa', data: {
                    '1K': { avg: [262, 322, 635, 698.3, 263], low: [158, 206, 434, 214.4, 157] },
                    '2K': { avg: [260, 321, 565, 653.3, 256], low: [154, 194, 386, 212.7, 149] }
                }},
                { id: '16Gx2_xcp8200', name: '16Gx2 XCP8200', color: '#f87171', data: {
                    '1K': { avg: [293, 317, 704, 849.7, 288], low: [163, 183, 491, 252.9, 177] },
                    '2K': { avg: [269, 298, 640, 718.4, 285], low: [154, 169, 391, 247.8, 170] }
                }}
            ]
        };

        // 状态管理
        let state = {
            selectedConfigs: ['16Gx1_xcp8200', '16Gx2_xmp6000'], // 默认选中两组对比
            resolution: 'both', // 'both', '1K', '2K'
            chartType: 'grouped' // 'grouped', 'avgOnly', 'lowOnly', 'radar', 'line'
        };

        let myChart = null;

        // 初始化配置选择器
        function initConfigSelector() {
            const group = document.getElementById('configGroup');
            testData.configs.forEach(config => {
                const item = document.createElement('label');
                item.className = 'checkbox-item' + (state.selectedConfigs.includes(config.id) ? ' active' : '');
                item.innerHTML = `
                    <input type="checkbox" value="${config.id}" ${state.selectedConfigs.includes(config.id) ? 'checked' : ''}>
                    <span class="check-icon">${state.selectedConfigs.includes(config.id) ? '✓' : ''}</span>
                    <span>${config.name}</span>
                `;
                item.onclick = function(e) {
                    e.preventDefault();
                    const checkbox = this.querySelector('input');
                    checkbox.checked = !checkbox.checked;
                    toggleConfig(config.id, this);
                };
                group.appendChild(item);
            });
        }

        // 切换配置选择
        function toggleConfig(configId, element) {
            const index = state.selectedConfigs.indexOf(configId);
            const icon = element.querySelector('.check-icon');
            
            if (index > -1) {
                state.selectedConfigs.splice(index, 1);
                element.classList.remove('active');
                icon.textContent = '';
            } else {
                state.selectedConfigs.push(configId);
                element.classList.add('active');
                icon.textContent = '✓';
            }
            
            updateChart();
        }

        // 设置分辨率
        function setResolution(res) {
            state.resolution = res;
            document.querySelectorAll('.res-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.res === res);
            });
            updateChart();
        }

        // 设置图表类型
        function setChartType(type) {
            state.chartType = type;
            document.querySelectorAll('.chart-type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(getTypeName(type)));
            });
            updateChart();
        }

        function getTypeName(type) {
            const names = {
                'grouped': '分组柱状图',
                'avgOnly': '仅平均帧',
                'lowOnly': '仅1%Low',
                'radar': '雷达图',
                'line': '折线趋势'
            };
            return names[type];
        }

        // 获取选中的配置数据
        function getSelectedData() {
            return testData.configs.filter(c => state.selectedConfigs.includes(c.id));
        }

        // 创建分组柱状图选项
        function createGroupedOption() {
            const selected = getSelectedData();
            const series = [];
            const isBoth = state.resolution === 'both';
            const resolutions = isBoth ? ['1K', '2K'] : [state.resolution];
            
            selected.forEach(config => {
                resolutions.forEach(res => {
                    const suffix = isBoth ? ` ${res}` : '';
                    const brightness = res === '1K' ? 1 : 0.7;
                    
                    // 平均帧
                    series.push({
                        name: `${config.name}${suffix} 平均帧`,
                        type: 'bar',
                        data: config.data[res].avg,
                        itemStyle: {
                            color: adjustBrightness(config.color, brightness),
                            borderRadius: [4, 4, 0, 0]
                        },
                        barWidth: isBoth ? '10%' : '15%',
                        label: {
                            show: true,
                            position: 'top',
                            fontSize: 10,
                            formatter: '{c}'
                        }
                    });
                    
                    // 1%Low
                    series.push({
                        name: `${config.name}${suffix} 1%Low`,
                        type: 'bar',
                        data: config.data[res].low,
                        itemStyle: {
                            color: adjustBrightness(config.color, brightness * 0.6),
                            borderRadius: [4, 4, 0, 0]
                        },
                        barWidth: isBoth ? '10%' : '15%',
                        label: {
                            show: true,
                            position: 'top',
                            fontSize: 10,
                            formatter: '{c}'
                        }
                    });
                });
            });

            const mobile = isMobile();
            const smallMobile = isSmallMobile();
            
            return {
                title: {
                    text: `📊 内存配置性能对比 - ${state.resolution === 'both' ? '1K vs 2K' : state.resolution}`,
                    left: 'center',
                    textStyle: { fontSize: mobile ? (smallMobile ? 14 : 16) : 20, color: '#e2e8f0' }
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    backgroundColor: 'rgba(15, 23, 42, 0.95)',
                    borderColor: '#334155',
                    textStyle: { color: '#e2e8f0', fontSize: mobile ? 11 : 12 }
                },
                legend: {
                    data: series.map(s => s.name),
                    top: mobile ? (smallMobile ? 35 : 40) : 50,
                    type: 'scroll',
                    textStyle: { color: '#94a3b8', fontSize: mobile ? (smallMobile ? 9 : 10) : 11 },
                    pageIconColor: '#60a5fa',
                    pageTextStyle: { color: '#94a3b8' },
                    itemWidth: mobile ? 15 : 25,
                    itemHeight: mobile ? 10 : 14
                },
                grid: {
                    left: mobile ? '2%' : '3%',
                    right: mobile ? '2%' : '4%',
                    bottom: mobile ? (smallMobile ? '15%' : '12%') : '10%',
                    top: mobile ? (smallMobile ? 70 : 85) : 120,
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: testData.games,
                    axisLabel: { 
                        fontSize: mobile ? (smallMobile ? 10 : 11) : 13, 
                        color: '#94a3b8', 
                        fontWeight: 'bold',
                        rotate: mobile ? 30 : 0,
                        interval: 0
                    },
                    axisLine: { lineStyle: { color: '#334155' } }
                },
                yAxis: {
                    type: 'value',
                    name: '帧率 (FPS)',
                    nameTextStyle: { color: '#64748b' },
                    axisLabel: { color: '#64748b' },
                    splitLine: { lineStyle: { color: '#1e293b' } }
                },
                series: series,
                animationDuration: 800
            };
        }

        // 仅平均帧
        function createAvgOnlyOption() {
            const selected = getSelectedData();
            const series = [];
            const isBoth = state.resolution === 'both';
            const resolutions = isBoth ? ['1K', '2K'] : [state.resolution];
            
            selected.forEach(config => {
                resolutions.forEach(res => {
                    const suffix = isBoth ? ` ${res}` : '';
                    const brightness = res === '1K' ? 1 : 0.7;
                    
                    series.push({
                        name: `${config.name}${suffix}`,
                        type: 'bar',
                        data: config.data[res].avg,
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: adjustBrightness(config.color, brightness) },
                                { offset: 1, color: adjustBrightness(config.color, brightness * 0.5) }
                            ]),
                            borderRadius: [6, 6, 0, 0]
                        },
                        barWidth: isBoth ? '12%' : '18%',
                        label: {
                            show: true,
                            position: 'top',
                            fontWeight: 'bold',
                            formatter: '{c}'
                        }
                    });
                });
            });

            const mobile = isMobile();
            const smallMobile = isSmallMobile();
            
            return {
                ...createGroupedOption(),
                series: series,
                title: {
                    text: `📈 平均帧率对比 - ${state.resolution === 'both' ? '1K vs 2K' : state.resolution}`,
                    left: 'center',
                    textStyle: { fontSize: mobile ? (smallMobile ? 14 : 16) : 20, color: '#e2e8f0' }
                }
            };
        }

        // 仅1%Low
        function createLowOnlyOption() {
            const selected = getSelectedData();
            const series = [];
            const isBoth = state.resolution === 'both';
            const resolutions = isBoth ? ['1K', '2K'] : [state.resolution];
            
            selected.forEach(config => {
                resolutions.forEach(res => {
                    const suffix = isBoth ? ` ${res}` : '';
                    series.push({
                        name: `${config.name}${suffix}`,
                        type: 'bar',
                        data: config.data[res].low,
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: adjustBrightness(config.color, res === '1K' ? 0.8 : 0.5) },
                                { offset: 1, color: adjustBrightness(config.color, res === '1K' ? 0.4 : 0.3) }
                            ]),
                            borderRadius: [6, 6, 0, 0]
                        },
                        barWidth: isBoth ? '12%' : '18%',
                        label: {
                            show: true,
                            position: 'top',
                            fontWeight: 'bold',
                            formatter: '{c}'
                        }
                    });
                });
            });

            const mobile = isMobile();
            const smallMobile = isSmallMobile();
            
            return {
                ...createGroupedOption(),
                series: series,
                title: {
                    text: `📉 1%Low帧率对比（稳定性）- ${state.resolution === 'both' ? '1K vs 2K' : state.resolution}`,
                    left: 'center',
                    textStyle: { fontSize: mobile ? (smallMobile ? 14 : 16) : 20, color: '#e2e8f0' }
                }
            };
        }

        // 雷达图
        function createRadarOption() {
            const selected = getSelectedData();
            const indicator = testData.games.map(game => ({ name: game, max: 900 }));
            const series = [];
            const isBoth = state.resolution === 'both';
            const resolutions = isBoth ? ['1K', '2K'] : [state.resolution];
            const mobile = isMobile();
            const smallMobile = isSmallMobile();
            
            selected.forEach(config => {
                resolutions.forEach(res => {
                    series.push({
                        name: `${config.name} ${res}`,
                        type: 'radar',
                        data: [{
                            value: config.data[res].avg,
                            name: `${config.name} ${res}`,
                            itemStyle: { color: adjustBrightness(config.color, res === '1K' ? 1 : 0.7) },
                            areaStyle: { opacity: 0.2 }
                        }],
                        symbol: 'circle',
                        symbolSize: mobile ? (smallMobile ? 4 : 5) : 8,
                        lineStyle: { width: mobile ? 1.5 : 2 }
                    });
                });
            });

            return {
                title: {
                    text: `🎯 综合性能雷达图 - ${state.resolution === 'both' ? '1K vs 2K' : state.resolution}`,
                    left: 'center',
                    textStyle: { fontSize: mobile ? (smallMobile ? 14 : 16) : 20, color: '#e2e8f0' }
                },
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(15, 23, 42, 0.95)',
                    borderColor: '#334155',
                    textStyle: { color: '#e2e8f0', fontSize: mobile ? 11 : 12 }
                },
                legend: {
                    data: series.map(s => s.name),
                    bottom: smallMobile ? 5 : 10,
                    textStyle: { color: '#94a3b8', fontSize: mobile ? (smallMobile ? 9 : 10) : 12 },
                    itemWidth: mobile ? 15 : 25,
                    itemHeight: mobile ? 10 : 14
                },
                radar: {
                    indicator: indicator,
                    center: ['50%', smallMobile ? '45%' : '50%'],
                    radius: mobile ? (smallMobile ? '50%' : '55%') : '65%',
                    axisName: { 
                        color: '#94a3b8',
                        fontSize: mobile ? (smallMobile ? 9 : 10) : 12
                    },
                    splitArea: {
                        areaStyle: {
                            color: ['rgba(96, 165, 250, 0.05)', 'rgba(96, 165, 250, 0.1)']
                        }
                    },
                    axisLine: { lineStyle: { color: '#334155' } },
                    splitLine: { lineStyle: { color: '#334155' } }
                },
                series: series
            };
        }

        // 折线图
        function createLineOption() {
            const selected = getSelectedData();
            const series = [];
            const isBoth = state.resolution === 'both';
            const resolutions = isBoth ? ['1K', '2K'] : [state.resolution];
            const mobile = isMobile();
            const smallMobile = isSmallMobile();
            
            selected.forEach(config => {
                resolutions.forEach(res => {
                    const suffix = isBoth ? ` ${res}` : '';
                    const brightness = res === '1K' ? 1 : 0.7;
                    
                    series.push({
                        name: `${config.name}${suffix} 平均帧`,
                        type: 'line',
                        data: config.data[res].avg,
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: mobile ? (smallMobile ? 5 : 6) : 10,
                        lineStyle: { width: mobile ? 2 : 3, color: adjustBrightness(config.color, brightness) },
                        itemStyle: { color: adjustBrightness(config.color, brightness) },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: adjustBrightness(config.color, brightness * 0.3) },
                                { offset: 1, color: 'transparent' }
                            ])
                        }
                    });
                    
                    series.push({
                        name: `${config.name}${suffix} 1%Low`,
                        type: 'line',
                        data: config.data[res].low,
                        smooth: true,
                        symbol: 'diamond',
                        symbolSize: mobile ? (smallMobile ? 4 : 5) : 8,
                        lineStyle: { width: mobile ? 1.5 : 2, type: 'dashed', color: adjustBrightness(config.color, brightness * 0.6) },
                        itemStyle: { color: adjustBrightness(config.color, brightness * 0.6) }
                    });
                });
            });

            return {
                title: {
                    text: `📈 性能趋势折线图 - ${state.resolution === 'both' ? '1K vs 2K' : state.resolution}`,
                    left: 'center',
                    textStyle: { fontSize: mobile ? (smallMobile ? 14 : 16) : 20, color: '#e2e8f0' }
                },
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(15, 23, 42, 0.95)',
                    borderColor: '#334155',
                    textStyle: { color: '#e2e8f0', fontSize: mobile ? 11 : 12 }
                },
                legend: {
                    data: series.map(s => s.name),
                    top: mobile ? (smallMobile ? 35 : 40) : 50,
                    type: 'scroll',
                    textStyle: { color: '#94a3b8', fontSize: mobile ? (smallMobile ? 9 : 10) : 11 },
                    itemWidth: mobile ? 15 : 25,
                    itemHeight: mobile ? 10 : 14
                },
                grid: {
                    left: mobile ? '2%' : '3%',
                    right: mobile ? '2%' : '4%',
                    bottom: mobile ? (smallMobile ? '8%' : '5%') : '3%',
                    top: mobile ? (smallMobile ? 70 : 85) : 120,
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: testData.games,
                    axisLabel: { 
                        fontSize: mobile ? (smallMobile ? 10 : 11) : 13, 
                        color: '#94a3b8',
                        rotate: mobile ? 30 : 0,
                        interval: 0
                    },
                    axisLine: { lineStyle: { color: '#334155' } }
                },
                yAxis: {
                    type: 'value',
                    name: '帧率 (FPS)',
                    nameTextStyle: { color: '#64748b' },
                    axisLabel: { color: '#64748b' },
                    splitLine: { lineStyle: { color: '#1e293b' } }
                },
                series: series
            };
        }

        // 辅助函数：调整颜色亮度
        function adjustBrightness(hex, factor) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = Math.min(255, Math.floor((num >> 16) * factor));
            const g = Math.min(255, Math.floor(((num >> 8) & 0x00FF) * factor));
            const b = Math.min(255, Math.floor((num & 0x0000FF) * factor));
            return `rgb(${r}, ${g}, ${b})`;
        }

        // 更新统计面板
        function updateStats() {
            const selected = getSelectedData();
            const panel = document.getElementById('statsPanel');
            const isBoth = state.resolution === 'both';
            const resolutions = isBoth ? ['1K', '2K'] : [state.resolution];
            
            let html = '';
            selected.forEach(config => {
                resolutions.forEach(res => {
                    const avg = (config.data[res].avg.reduce((a, b) => a + b, 0) / config.data[res].avg.length).toFixed(1);
                    const low = (config.data[res].low.reduce((a, b) => a + b, 0) / config.data[res].low.length).toFixed(1);
                    const stability = ((low / avg) * 100).toFixed(1);
                    
                    html += `
                        <div class="stat-card">
                            <div class="stat-header">
                                <span class="stat-title">${config.name}</span>
                                <span class="stat-badge badge-${res.toLowerCase()}">${res}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                                <div>
                                    <div style="font-size: 12px; color: #64748b; margin-bottom: 4px;">平均帧</div>
                                    <div class="stat-value" style="font-size: 28px;">${avg}</div>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 12px; color: #64748b; margin-bottom: 4px;">1%Low</div>
                                    <div class="stat-value" style="font-size: 28px;">${low}</div>
                                </div>
                            </div>
                            <div class="stat-detail" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(148, 163, 184, 0.2);">
                                帧稳定性: <span style="color: ${stability > 60 ? '#4ade80' : '#fbbf24'}">${stability}%</span>
                                ${isBoth && res === '2K' ? `<span style="float: right;">vs 1K: ${((1 - avg / getAvg(config.data['1K'].avg)) * 100).toFixed(1)}% 损失</span>` : ''}
                            </div>
                        </div>
                    `;
                });
            });
            
            panel.innerHTML = html;
        }

        // 获取平均值
        function getAvg(arr) {
            return arr.reduce((a, b) => a + b, 0) / arr.length;
        }

        // 更新对比表格
        function updateTable() {
            const selected = getSelectedData();
            const isBoth = state.resolution === 'both';
            const resolutions = isBoth ? ['1K', '2K'] : [state.resolution];
            
            let html = '<table><thead><tr><th>游戏</th><th>配置</th><th>分辨率</th><th>平均帧</th><th>1%Low</th><th>稳定性</th></tr></thead><tbody>';
            
            testData.games.forEach((game, idx) => {
                selected.forEach(config => {
                    resolutions.forEach(res => {
                        const avg = config.data[res].avg[idx];
                        const low = config.data[res].low[idx];
                        const stability = ((low / avg) * 100).toFixed(1);
                        
                        // 找出该游戏该分辨率下的最佳表现
                        const allAvgs = selected.map(c => c.data[res].avg[idx]);
                        const isBest = avg === Math.max(...allAvgs);
                        
                        html += `
                            <tr>
                                <td><strong>${game}</strong></td>
                                <td style="color: ${config.color}">${config.name}</td>
                                <td><span class="badge-${res.toLowerCase()}">${res}</span></td>
                                <td class="${isBest ? 'cell-best' : ''}">${avg}</td>
                                <td>${low}</td>
                                <td style="color: ${stability > 60 ? '#4ade80' : stability > 40 ? '#fbbf24' : '#f87171'}">${stability}%</td>
                            </tr>
                        `;
                    });
                });
            });
            
            html += '</tbody></table>';
            document.getElementById('comparisonTable').innerHTML = html;
        }

        // 更新图表
        function updateChart() {
            if (state.selectedConfigs.length === 0) {
                myChart.setOption({
                    title: { text: '⚠️ 请至少选择一个配置进行对比', left: 'center', textStyle: { color: '#e2e8f0' } },
                    series: []
                }, true);
                return;
            }

            let option;
            switch(state.chartType) {
                case 'grouped': option = createGroupedOption(); break;
                case 'avgOnly': option = createAvgOnlyOption(); break;
                case 'lowOnly': option = createLowOnlyOption(); break;
                case 'radar': option = createRadarOption(); break;
                case 'line': option = createLineOption(); break;
                default: option = createGroupedOption();
            }
            
            myChart.setOption(option, true);
            updateStats();
            updateTable();
        }

        // 检测是否为移动端
        function isMobile() {
            return window.innerWidth <= 768;
        }
        
        function isSmallMobile() {
            return window.innerWidth <= 480;
        }

        // 初始化
        function init() {
            myChart = echarts.init(document.getElementById('mainChart'));
            initConfigSelector();
            updateChart();
            
            window.addEventListener('resize', () => {
                myChart.resize();
                // 重新渲染图表以应用移动端适配
                updateChart();
            });
        }

        // 启动
        init();
    </script>
</body>
</html>
